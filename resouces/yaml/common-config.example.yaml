# Copy this file to:
#   resouces/yaml/common-config.yaml
# and then fill all placeholders before running the service.
#
# This file is safe to publish. Do NOT commit the real common-config.yaml.

middleware:
  host: "<MIDDLEWARE_HOST>"
  ports:
    postgres: 5432
    mysql: 3306
    redis: 6379
    kafka: 9092

spring:
  datasource:
    # Example: jdbc:postgresql://<host>:5432/shizuki_app
    url: "<DB_URL>"
    username: "<DB_USERNAME>"
    password: "<DB_PASSWORD>"

  data:
    redis:
      host: "<REDIS_HOST>"
      port: 6379
      password: "<REDIS_PASSWORD>"
      database: 0

  kafka:
    # Example: "<host>:9092"
    bootstrap-servers: "<KAFKA_BOOTSTRAP_SERVERS>"

  mail:
    # QQ SMTP:
    # Option A (recommended): port=465 + ssl.enable=true + starttls.enable=false
    # Option B: port=587 + starttls.enable=true + ssl.enable=false
    protocol: "smtp"
    host: "<MAIL_HOST>"
    port: 465
    username: "<MAIL_USERNAME>"
    password: "<MAIL_PASSWORD>"
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
          starttls:
            enable: false
          ssl:
            enable: true

shizuki:
  admin:
    privilege:
      code-plain: "<ADMIN_PRIVILEGE_CODE>"
  oauth:
    providers:
      github:
        client-id: "<GITHUB_CLIENT_ID>"
        client-secret: "<GITHUB_CLIENT_SECRET>"
        authorize-url: "https://github.com/login/oauth/authorize"
        token-url: "https://github.com/login/oauth/access_token"
        user-api-url: "https://api.github.com/user"
        scope: "read:user user:email"
      linuxdo:
        client-id: "<LINUXDO_CLIENT_ID>"
        client-secret: "<LINUXDO_CLIENT_SECRET>"
        authorize-url: "https://connect.linux.do/oauth2/authorize"
        token-url: "https://connect.linux.do/oauth2/token"
        user-api-url: "https://connect.linux.do/api/user"
        scope: "openid profile email"
      spotify:
        client-id: "<SPOTIFY_CLIENT_ID>"
        client-secret: "<SPOTIFY_CLIENT_SECRET>"
        authorize-url: "https://accounts.spotify.com/authorize"
        token-url: "https://accounts.spotify.com/api/token"
        user-api-url: "https://api.spotify.com/v1/me"
        scope: "user-read-email user-read-private"
  music:
    meting:
      # Internal sidecar URL; keep this in private network.
      base-url: "http://meting-api"
      default-api-key: "meting-system"
      default-platform-order: ["netease", "kuwo", "qq"]
      default-quality: "128k"
      default-bitrate-kbps: 128
      default-playlist-ids:
        netease: "3778678"
        kuwo: "145114659"
        qq: "9209322004"
    spotify:
      client-id: "<SPOTIFY_CLIENT_ID>"
      client-secret: "<SPOTIFY_CLIENT_SECRET>"
      token-url: "https://accounts.spotify.com/api/token"
      search-url: "https://api.spotify.com/v1/search"
      track-url: "https://api.spotify.com/v1/tracks"
    security:
      # Generate once: openssl rand -base64 32
      key-encryption-master-key: "<MUSIC_KEY_ENCRYPTION_MASTER_KEY_BASE64_32_BYTES>"
  oss:
    endpoint: "<OSS_ENDPOINT>"
    access-key-id: "<OSS_ACCESS_KEY_ID>"
    access-key-secret: "<OSS_ACCESS_KEY_SECRET>"
  media:
    storage:
      private-bucket: "<OSS_PRIVATE_BUCKET>"
      public-bucket: "<OSS_PUBLIC_BUCKET>"
      public-base-url: "<OSS_PUBLIC_BASE_URL>"
      validate-buckets-on-startup: true
  blog:
    storage:
      private-bucket: "<BLOG_PRIVATE_BUCKET>"
      max-upload-size: 1048576
    notion:
      enabled: false
      token: "<NOTION_INTERNAL_TOKEN>"
      data-source-id: "<NOTION_DATA_SOURCE_ID>"
      owner-user-id: 1
      version: "2026-03-11"
      api-base-url: "https://api.notion.com/v1"
      rate-limit-per-second: 2
      connect-timeout-ms: 1500
      read-timeout-ms: 4000
      retry-count: 2
      retry-backoff-ms: 250
      retry-max-backoff-ms: 2000
      nightly-cron: "0 0 3 * * *"
      timezone: "Asia/Shanghai"
      properties:
        title: "Name"
        summary: "Summary"
        category: "Category"
        slug: "Slug"
        tags: "Tags"
        visibility: "Visibility"
        status: "Status"
        cover-image-url: "CoverImageUrl"
        author-user-id: "AuthorUserId"
        published-at: "PublishedAt"
        allowed-groups: "AllowedGroups"
  light-app:
    task:
      notion:
        enabled: false
        token: "<NOTION_INTERNAL_TOKEN>"
        data-source-id: "<NOTION_TASK_DATA_SOURCE_ID>"
        owner-user-id: 1
        version: "2026-03-11"
        api-base-url: "https://api.notion.com/v1"
        rate-limit-per-second: 2
        connect-timeout-ms: 1500
        read-timeout-ms: 4000
        retry-count: 2
        retry-backoff-ms: 250
        retry-max-backoff-ms: 2000
        nightly-cron: "0 0 3 * * *"
        timezone: "Asia/Shanghai"
        properties:
          title: "Name"
          status: "Status"
          project-code: "ProjectCode"
          schedule: "Schedule"
          show-on-calendar: "ShowOnCalendar"
  auth:
    jwt:
      secret: "<AUTH_JWT_SECRET>"
