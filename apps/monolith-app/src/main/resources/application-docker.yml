spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/shizuki_app}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
shizuki:
  ai:
    memory:
      base-url: ${AI_MEMORY_BASE_URL:http://host.docker.internal:8788}
