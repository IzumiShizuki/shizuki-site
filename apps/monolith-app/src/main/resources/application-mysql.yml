middleware:
  ports:
    mysql: ${MIDDLEWARE_MYSQL_PORT:3306}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://${middleware.host}:${middleware.ports.mysql}/shizuki_app?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  flyway:
    locations: ${FLYWAY_LOCATIONS:classpath:monolith/db/migration}
