management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  level:
    org.apache.kafka.clients.consumer.ConsumerConfig: WARN
    org.apache.kafka.clients.producer.ProducerConfig: WARN
    org.apache.kafka.clients.admin.AdminClientConfig: WARN
    org.apache.kafka.common.utils.AppInfoParser: WARN
    "org.springframework.kafka.core.DefaultKafkaConsumerFactory$ExtendedKafkaConsumer": WARN
    "org.springframework.kafka.core.DefaultKafkaProducerFactory$ExtendedKafkaProducer": WARN
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: ${AUTH_ACCESS_TTL_SECONDS:7200}
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: jwt
  jwt-secret-key: ${shizuki.auth.jwt.secret}
shizuki:
  audit:
    outbox:
      enabled: true
      batch-size: 100
      poll-interval: 5000
      max-retries: 8
      retry-base-seconds: 2
      retry-max-seconds: 300
    publisher:
      type: ${AUDIT_PUBLISHER_TYPE:noop}
      kafka-topic: ${AUDIT_KAFKA_TOPIC:shizuki.audit.log}
      kafka-send-timeout-ms: ${AUDIT_KAFKA_SEND_TIMEOUT_MS:3000}
  ai:
    quota:
      code: ai_round_total
      default-total-rounds: 5
    chat:
      enabled: ${AI_CHAT_ENABLED:false}
      base-url: ${AI_CHAT_BASE_URL:}
      api-key: ${AI_CHAT_API_KEY:}
      model: ${AI_CHAT_MODEL:gpt-5.5}
      system-prompt: ${AI_CHAT_SYSTEM_PROMPT:}
      connect-timeout-ms: ${AI_CHAT_CONNECT_TIMEOUT_MS:2500}
      read-timeout-ms: ${AI_CHAT_READ_TIMEOUT_MS:90000}
      max-tokens: ${AI_CHAT_MAX_TOKENS:800}
      max-context-messages: ${AI_CHAT_MAX_CONTEXT_MESSAGES:12}
      max-worldbook-entries: ${AI_CHAT_MAX_WORLDBOOK_ENTRIES:8}
      temperature: ${AI_CHAT_TEMPERATURE:0.7}
    memory:
      enabled: ${AI_MEMORY_ENABLED:true}
      base-url: ${AI_MEMORY_BASE_URL:http://127.0.0.1:8788}
      connect-timeout-ms: ${AI_MEMORY_CONNECT_TIMEOUT_MS:1200}
      read-timeout-ms: ${AI_MEMORY_READ_TIMEOUT_MS:4000}
      retrieval-max-results: ${AI_MEMORY_RETRIEVAL_MAX_RESULTS:4}
      journal-limit: ${AI_MEMORY_JOURNAL_LIMIT:5}
  user:
    quota-resolve-connect-timeout-ms: ${USER_QUOTA_RESOLVE_CONNECT_TIMEOUT_MS:500}
    quota-resolve-timeout-ms: ${USER_QUOTA_RESOLVE_TIMEOUT_MS:1200}
    quota-resolve-retry-count: ${USER_QUOTA_RESOLVE_RETRY_COUNT:1}
    quota-resolve-retry-backoff-ms: ${USER_QUOTA_RESOLVE_RETRY_BACKOFF_MS:120}
    quota-resolve-retry-max-backoff-ms: ${USER_QUOTA_RESOLVE_RETRY_MAX_BACKOFF_MS:1000}
  oauth:
    connect-timeout-ms: ${OAUTH_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${OAUTH_READ_TIMEOUT_MS:8000}
    retry-count: ${OAUTH_RETRY_COUNT:2}
    retry-backoff-ms: ${OAUTH_RETRY_BACKOFF_MS:300}
    retry-max-backoff-ms: ${OAUTH_RETRY_MAX_BACKOFF_MS:3000}
    providers:
      github:
        client-id: ${GITHUB_CLIENT_ID:}
        client-secret: ${GITHUB_CLIENT_SECRET:}
        authorize-url: ${GITHUB_AUTHORIZE_URL:https://github.com/login/oauth/authorize}
        token-url: ${GITHUB_TOKEN_URL:https://github.com/login/oauth/access_token}
        user-api-url: ${GITHUB_USER_API_URL:https://api.github.com/user}
        scope: ${GITHUB_SCOPE:read:user user:email}
      linuxdo:
        client-id: ${LINUXDO_CLIENT_ID:}
        client-secret: ${LINUXDO_CLIENT_SECRET:}
        authorize-url: ${LINUXDO_AUTHORIZE_URL:https://connect.linux.do/oauth2/authorize}
        token-url: ${LINUXDO_TOKEN_URL:https://connect.linux.do/oauth2/token}
        user-api-url: ${LINUXDO_USER_API_URL:https://connect.linux.do/api/user}
        scope: ${LINUXDO_SCOPE:openid profile email}
      spotify:
        client-id: ${SPOTIFY_CLIENT_ID:}
        client-secret: ${SPOTIFY_CLIENT_SECRET:}
        authorize-url: ${SPOTIFY_AUTHORIZE_URL:https://accounts.spotify.com/authorize}
        token-url: ${SPOTIFY_TOKEN_URL:https://accounts.spotify.com/api/token}
        user-api-url: ${SPOTIFY_USER_API_URL:https://api.spotify.com/v1/me}
        scope: ${SPOTIFY_SCOPE:user-read-email user-read-private}
  music:
    meting:
      base-url: ${MUSIC_METING_BASE_URL:http://meting-api}
      default-api-key: ${MUSIC_METING_DEFAULT_API_KEY:meting-system}
      default-platform-order:
      - ${MUSIC_METING_DEFAULT_PLATFORM_ORDER_1:netease}
      - ${MUSIC_METING_DEFAULT_PLATFORM_ORDER_2:kuwo}
      - ${MUSIC_METING_DEFAULT_PLATFORM_ORDER_3:qq}
      default-quality: ${MUSIC_METING_DEFAULT_QUALITY:128k}
      default-bitrate-kbps: ${MUSIC_METING_DEFAULT_BITRATE_KBPS:128}
      default-playlist-ids:
        netease: ${MUSIC_METING_DEFAULT_PLAYLIST_ID_NETEASE:3778678}
        kuwo: ${MUSIC_METING_DEFAULT_PLAYLIST_ID_KUWO:145114659}
        qq: ${MUSIC_METING_DEFAULT_PLAYLIST_ID_QQ:9209322004}
      connect-timeout-ms: ${MUSIC_METING_CONNECT_TIMEOUT_MS:1200}
      read-timeout-ms: ${MUSIC_METING_READ_TIMEOUT_MS:5000}
    ncm:
      base-url: ${MUSIC_NCM_BASE_URL:http://music-ncm-api:3000}
      connect-timeout-ms: ${MUSIC_NCM_CONNECT_TIMEOUT_MS:1200}
      read-timeout-ms: ${MUSIC_NCM_READ_TIMEOUT_MS:5000}
      poll-interval-ms: ${MUSIC_NCM_POLL_INTERVAL_MS:1800}
      session-ttl-seconds: ${MUSIC_NCM_SESSION_TTL_SECONDS:180}
    web-auth:
      base-url: ${MUSIC_WEB_AUTH_BASE_URL:http://music-web-auth-sidecar:39041}
      api-token: ${MUSIC_WEB_AUTH_TOKEN:}
      connect-timeout-ms: ${MUSIC_WEB_AUTH_CONNECT_TIMEOUT_MS:1500}
      read-timeout-ms: ${MUSIC_WEB_AUTH_READ_TIMEOUT_MS:5000}
      poll-interval-ms: ${MUSIC_WEB_AUTH_POLL_INTERVAL_MS:1800}
    spotify:
      client-id: ${SPOTIFY_CLIENT_ID:}
      client-secret: ${SPOTIFY_CLIENT_SECRET:}
      token-url: ${MUSIC_SPOTIFY_TOKEN_URL:https://accounts.spotify.com/api/token}
      search-url: ${MUSIC_SPOTIFY_SEARCH_URL:https://api.spotify.com/v1/search}
      track-url: ${MUSIC_SPOTIFY_TRACK_URL:https://api.spotify.com/v1/tracks}
      connect-timeout-ms: ${MUSIC_SPOTIFY_CONNECT_TIMEOUT_MS:800}
      read-timeout-ms: ${MUSIC_SPOTIFY_READ_TIMEOUT_MS:1500}
      retry-count: ${MUSIC_SPOTIFY_RETRY_COUNT:2}
      retry-backoff-ms: ${MUSIC_SPOTIFY_RETRY_BACKOFF_MS:80}
      retry-max-backoff-ms: ${MUSIC_SPOTIFY_RETRY_MAX_BACKOFF_MS:600}
      circuit-breaker-failure-threshold: ${MUSIC_SPOTIFY_CIRCUIT_BREAKER_FAILURE_THRESHOLD:3}
      circuit-breaker-open-seconds: ${MUSIC_SPOTIFY_CIRCUIT_BREAKER_OPEN_SECONDS:30}
    asmr:
      server: ${MUSIC_ASMR_SERVER:https://api.asmr-300.com}
      base-url: ${MUSIC_ASMR_BASE_URL:https://api.asmr.one}
      base-urls:
      - ${MUSIC_ASMR_BASE_URL_1:https://api.asmr.one}
      - ${MUSIC_ASMR_BASE_URL_2:https://api.asmr-100.com}
      - ${MUSIC_ASMR_BASE_URL_3:https://api.asmr-200.com}
      - ${MUSIC_ASMR_BASE_URL_4:https://api.asmr-300.com}
      default-order: ${MUSIC_ASMR_DEFAULT_ORDER:release}
      default-sort: ${MUSIC_ASMR_DEFAULT_SORT:desc}
      connect-timeout-ms: ${MUSIC_ASMR_CONNECT_TIMEOUT_MS:1000}
      read-timeout-ms: ${MUSIC_ASMR_READ_TIMEOUT_MS:5000}
    listen-cache:
      enabled: ${MUSIC_LISTEN_CACHE_ENABLED:true}
      retention-days: ${MUSIC_LISTEN_CACHE_RETENTION_DAYS:30}
      cleanup-interval-ms: ${MUSIC_LISTEN_CACHE_CLEANUP_INTERVAL_MS:3600000}
      login-only: ${MUSIC_LISTEN_CACHE_LOGIN_ONLY:true}
      storage-mode: ${MUSIC_LISTEN_CACHE_STORAGE_MODE:smart}
      url-ttl-threshold-seconds: ${MUSIC_LISTEN_CACHE_URL_TTL_THRESHOLD_SECONDS:86400}
    library-home-cache:
      enabled: ${MUSIC_LIBRARY_HOME_CACHE_ENABLED:true}
      redis-key: ${MUSIC_LIBRARY_HOME_CACHE_REDIS_KEY:music:library:home:v1}
      ttl-seconds: ${MUSIC_LIBRARY_HOME_CACHE_TTL_SECONDS:172800}
      refresh-cron: ${MUSIC_LIBRARY_HOME_CACHE_REFRESH_CRON:0 0 0 * * *}
      refresh-zone: ${MUSIC_LIBRARY_HOME_CACHE_REFRESH_ZONE:Asia/Shanghai}
    cache-upload:
      kafka:
        enabled: ${MUSIC_CACHE_UPLOAD_KAFKA_ENABLED:true}
        topic: ${MUSIC_CACHE_UPLOAD_KAFKA_TOPIC:music.track.cache.upload}
        group-id: ${MUSIC_CACHE_UPLOAD_KAFKA_GROUP_ID:music-track-cache-upload-consumer}
  auth:
    jwt:
      secret: ${AUTH_JWT_SECRET:${random.uuid}}
      access-ttl-seconds: ${AUTH_ACCESS_TTL_SECONDS:7200}
      refresh-ttl-seconds: ${AUTH_REFRESH_TTL_SECONDS:2592000}
      refresh-rotate: ${AUTH_REFRESH_ROTATE:true}
    captcha:
      image-ttl-seconds: ${AUTH_CAPTCHA_IMAGE_TTL_SECONDS:120}
      image-length: ${AUTH_CAPTCHA_IMAGE_LENGTH:2}
      image-max-attempts: ${AUTH_CAPTCHA_IMAGE_MAX_ATTEMPTS:5}
    verify:
      email-ttl-seconds: ${AUTH_VERIFY_EMAIL_TTL_SECONDS:300}
      email-cooldown-seconds: ${AUTH_VERIFY_EMAIL_COOLDOWN_SECONDS:60}
      email-max-attempts: ${AUTH_VERIFY_EMAIL_MAX_ATTEMPTS:5}
    bind:
      ticket-ttl-seconds: ${AUTH_BIND_TICKET_TTL_SECONDS:600}
    retry:
      count: ${AUTH_RETRY_COUNT:1}
      backoff-ms: ${AUTH_RETRY_BACKOFF_MS:120}
      max-backoff-ms: ${AUTH_RETRY_MAX_BACKOFF_MS:1000}
  security:
    secret:
      enforce: ${SECRET_ENFORCE:false}
  admin:
    privilege:
      unlock-ttl-seconds: ${ADMIN_PRIVILEGE_UNLOCK_TTL_SECONDS:1800}
      code-hash: ${ADMIN_PRIVILEGE_CODE_HASH:}
      code-plain: ${ADMIN_PRIVILEGE_CODE:}
    meguri-metrics:
      ingest-token: ${MEGURI_METRICS_INGEST_TOKEN:}
      stale-after-seconds: ${MEGURI_METRICS_STALE_AFTER_SECONDS:300}
  media:
    storage:
      private-bucket: ${OSS_PRIVATE_BUCKET:zhuowang-files}
      public-bucket: ${OSS_PUBLIC_BUCKET:izumi-test-01}
      public-base-url: ${OSS_PUBLIC_BASE_URL:}
      sign-expire-seconds: 600
      max-upload-size: 52428800
      max-l2d-zip-entry-count: 2048
      max-l2d-zip-entry-name-length: 1024
      max-l2d-zip-single-entry-size: 20971520
      max-l2d-zip-total-size: 104857600
      enable-object-hash-dedup: true
      enable-security-scan-hook: false
      validate-buckets-on-startup: ${OSS_VALIDATE_BUCKETS_ON_STARTUP:true}
      allowed-content-types:
      - image/png
      - image/jpeg
      - image/webp
      - image/gif
      - image/apng
      - application/zip
      - application/x-zip-compressed
      - audio/mpeg
      - audio/wav
      - audio/ogg
    wallpaper:
      bootstrap:
        enabled: ${WALLPAPER_BOOTSTRAP_ENABLED:true}
        owner-user-id: ${WALLPAPER_BOOTSTRAP_OWNER_USER_ID:1}
      workshop:
        enabled: ${WALLPAPER_WORKSHOP_ENABLED:false}
        steamcmd-path: ${WALLPAPER_STEAMCMD_PATH:steamcmd}
        steam-username: ${WALLPAPER_STEAM_USERNAME:}
        steam-password: ${WALLPAPER_STEAM_PASSWORD:}
        workshop-app-id: ${WALLPAPER_WORKSHOP_APP_ID:431960}
        download-root: ${WALLPAPER_WORKSHOP_DOWNLOAD_ROOT:/tmp/steam-workshop}
        command-timeout-seconds: ${WALLPAPER_WORKSHOP_TIMEOUT_SECONDS:180}
  blog:
    storage:
      private-bucket: ${BLOG_PRIVATE_BUCKET:${OSS_PRIVATE_BUCKET:zhuowang-files}}
      max-upload-size: ${BLOG_MAX_UPLOAD_SIZE:1048576}
    presentation:
      generator-base-url: ${BLOG_PRESENTATION_GENERATOR_BASE_URL:}
      download-expire-seconds: ${BLOG_PRESENTATION_DOWNLOAD_EXPIRE_SECONDS:900}
      connect-timeout-ms: ${BLOG_PRESENTATION_CONNECT_TIMEOUT_MS:2000}
      read-timeout-ms: ${BLOG_PRESENTATION_READ_TIMEOUT_MS:660000}
    video:
      converter-base-url: ${BLOG_VIDEO_CONVERTER_BASE_URL:}
      connect-timeout-ms: ${BLOG_VIDEO_CONNECT_TIMEOUT_MS:2000}
      read-timeout-ms: ${BLOG_VIDEO_READ_TIMEOUT_MS:900000}
      max-keyframes: ${BLOG_VIDEO_MAX_KEYFRAMES:12}
      allow-local-files: ${BLOG_VIDEO_ALLOW_LOCAL_FILES:false}
      allowed-domains:
      - youtube.com
      - youtu.be
      - bilibili.com
      - b23.tv
  content:
    author-profile:
      cache:
        ttl-seconds: ${AUTHOR_PROFILE_CACHE_TTL_SECONDS:120}
        public-max-age-seconds: ${AUTHOR_PROFILE_PUBLIC_MAX_AGE_SECONDS:60}
        stale-while-revalidate-seconds: ${AUTHOR_PROFILE_STALE_WHILE_REVALIDATE_SECONDS:300}
  oss:
    endpoint: ${OSS_ENDPOINT:https://oss-cn-hangzhou.aliyuncs.com}
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  gateway:
    auth:
      enabled: true
      cache-ttl-seconds: ${AUTH_INTROSPECT_CACHE_TTL_SECONDS:30}
      cache-max-entries: ${AUTH_INTROSPECT_CACHE_MAX_ENTRIES:10000}
      guest-invalid-token-policy: ${AUTH_GUEST_INVALID_TOKEN_POLICY:downgrade}
      public-paths:
      - /api/v1/auth/tokens
      - /api/v1/auth/register/**
      - /api/v1/auth/oauth/**
      - /api/v1/auth/bindings/**
      - /api/v1/auth/captchas/**
      - /api/v1/auth/verifications/**
      - /api/v1/internal/meguri/prompt-cache
      - /actuator/**
      guest-paths:
      - /api/v1/posts/**
      - /api/v1/apps/**
      - /api/v1/ai-sessions/**
      - /api/v1/ai-town/scenes/**
      - /api/v1/ai-town/public-map
      - /api/v1/assets/public/**
      - /api/v1/assets/*/download-url
      - /api/v1/music/playlist/default/**
      - /api/v1/music/playlists/**
      - /api/v1/music/library/home
      - /api/v1/music/search
      - /api/v1/music/tracks/resolve-playback
      - /api/v1/music/providers
      - /api/v1/music/key-guide
      - /api/v1/music/meting/status
      - /api/v1/music/spotify/search
      - /api/v1/music/spotify/preview-url
      - /api/v1/author/profile/**
      - /api/v1/home-wallpapers/public
  flyway:
    auto-repair-on-validate-error: ${FLYWAY_AUTO_REPAIR_ON_VALIDATE_ERROR:true}
    allow-auto-repair-in-prod: ${FLYWAY_ALLOW_AUTO_REPAIR_IN_PROD:false}
middleware:
  host: ${MIDDLEWARE_HOST:127.0.0.1}
  ports:
    postgres: ${MIDDLEWARE_POSTGRES_PORT:5432}
    mysql: ${MIDDLEWARE_MYSQL_PORT:3306}
    redis: ${MIDDLEWARE_REDIS_PORT:6379}
    kafka: ${MIDDLEWARE_KAFKA_PORT:9092}
spring:
  config:
    import:
      - optional:file:./resouces/yaml/common-config.yaml
      - optional:file:../../resouces/yaml/common-config.yaml
  application:
    name: monolith-app
  servlet:
    multipart:
      max-file-size: ${APP_MULTIPART_MAX_FILE_SIZE:50MB}
      max-request-size: ${APP_MULTIPART_MAX_REQUEST_SIZE:50MB}
  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    url: ${DB_URL:jdbc:postgresql://${middleware.host}:${middleware.ports.postgres}/shizuki_app}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      auto-commit: true
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:600000}
      pool-name: ${DB_POOL_NAME:HikariPool}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      connection-test-query: SELECT 1
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: ${FLYWAY_LOCATIONS:classpath:monolith/db/migration-pg}
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:${middleware.host}}
      port: ${REDIS_PORT:${middleware.ports.redis}}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:3000ms}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:20}
          max-wait: ${REDIS_POOL_MAX_WAIT:-1ms}
          max-idle: ${REDIS_POOL_MAX_IDLE:10}
          min-idle: ${REDIS_POOL_MIN_IDLE:5}
        shutdown-timeout: ${REDIS_SHUTDOWN_TIMEOUT:100ms}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:${middleware.host}:${middleware.ports.kafka}}
    producer:
      retries: ${KAFKA_PRODUCER_RETRIES:3}
      batch-size: ${KAFKA_PRODUCER_BATCH_SIZE:16384}
      buffer-memory: ${KAFKA_PRODUCER_BUFFER_MEMORY:33554432}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      compression-type: ${KAFKA_PRODUCER_COMPRESSION:gzip}
      properties:
        request.timeout.ms: 5000
        delivery.timeout.ms: 10000
        linger.ms: 5
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:shizuki-consumer-group}
      auto-offset-reset: ${KAFKA_AUTO_OFFSET_RESET:earliest}
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      max-poll-records: ${KAFKA_MAX_POLL_RECORDS:500}
    listener:
      ack-mode: manual_immediate
      concurrency: ${KAFKA_LISTENER_CONCURRENCY:3}
  mail:
    protocol: ${MAIL_PROTOCOL:smtp}
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:25}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:10000}
          timeout: ${MAIL_SMTP_TIMEOUT:10000}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:10000}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}
          ssl:
            enable: ${MAIL_SMTP_SSL_ENABLE:false}
server:
  port: ${SERVER_PORT:7070}
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
