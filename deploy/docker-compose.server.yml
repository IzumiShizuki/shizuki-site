name: shizuki-site

services:
  presentation-generator:
    build:
      context: ..
      dockerfile: Dockerfile.presentation-generator
    image: shizuki-site/presentation-generator:latest
    container_name: shizuki-site-presentation-generator
    restart: unless-stopped
    environment:
      PORT: ${PRESENTATION_GENERATOR_PORT:-3210}
      SLIDEV_EXPORT_TIMEOUT_MS: ${PRESENTATION_GENERATOR_EXPORT_TIMEOUT_MS:-600000}
      SLIDEV_PAGE_TIMEOUT_MS: ${PRESENTATION_GENERATOR_PAGE_TIMEOUT_MS:-180000}
      SLIDEV_WAIT_UNTIL: ${PRESENTATION_GENERATOR_WAIT_UNTIL:-load}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || 3210) + '/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  document-converter:
    build:
      context: ..
      dockerfile: Dockerfile.document-converter
    image: shizuki-site/document-converter:latest
    container_name: shizuki-site-document-converter
    restart: unless-stopped
    environment:
      VIDEO_CONVERTER_PORT: ${VIDEO_CONVERTER_PORT:-3220}
      VIDEO_MAX_DURATION_SECONDS: ${VIDEO_MAX_DURATION_SECONDS:-7200}
      VIDEO_MAX_DOWNLOAD_BYTES: ${VIDEO_MAX_DOWNLOAD_BYTES:-1073741824}
      VIDEO_MAX_KEYFRAMES: ${VIDEO_MAX_KEYFRAMES:-12}
      VIDEO_COOKIES_FILE: ${VIDEO_COOKIES_FILE:-}
      VIDEO_ENABLE_VISION: ${VIDEO_ENABLE_VISION:-false}
    volumes:
      - document-converter-work:/tmp/shizuki-video
      - ${VIDEO_COOKIES_HOST_FILE:-/dev/null}:${VIDEO_COOKIES_FILE:-/run/secrets/video-cookies.txt}:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3220/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    image: shizuki-site/backend:latest
    container_name: shizuki-site-backend
    restart: unless-stopped
    env_file:
      - .env.server
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      AI_CHAT_ENABLED: ${AI_CHAT_ENABLED:-false}
      AI_CHAT_BASE_URL: ${AI_CHAT_BASE_URL:-}
      AI_CHAT_API_KEY: ${AI_CHAT_API_KEY:-}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-cpa-gpt-5.4-mini}
      AI_CHAT_SYSTEM_PROMPT: ${AI_CHAT_SYSTEM_PROMPT:-}
      AI_CHAT_CONNECT_TIMEOUT_MS: ${AI_CHAT_CONNECT_TIMEOUT_MS:-2500}
      AI_CHAT_READ_TIMEOUT_MS: ${AI_CHAT_READ_TIMEOUT_MS:-90000}
      AI_CHAT_MAX_TOKENS: ${AI_CHAT_MAX_TOKENS:-800}
      AI_CHAT_MAX_CONTEXT_MESSAGES: ${AI_CHAT_MAX_CONTEXT_MESSAGES:-12}
      AI_CHAT_MAX_WORLDBOOK_ENTRIES: ${AI_CHAT_MAX_WORLDBOOK_ENTRIES:-8}
      AI_CHAT_TEMPERATURE: ${AI_CHAT_TEMPERATURE:-0.7}
      BLOG_PRESENTATION_GENERATOR_BASE_URL: ${BLOG_PRESENTATION_GENERATOR_BASE_URL:-http://presentation-generator:3210}
      BLOG_PRESENTATION_CONNECT_TIMEOUT_MS: ${BLOG_PRESENTATION_CONNECT_TIMEOUT_MS:-2000}
      BLOG_PRESENTATION_READ_TIMEOUT_MS: ${BLOG_PRESENTATION_READ_TIMEOUT_MS:-660000}
      BLOG_VIDEO_CONVERTER_BASE_URL: ${BLOG_VIDEO_CONVERTER_BASE_URL:-http://document-converter:3220}
      BLOG_VIDEO_CONNECT_TIMEOUT_MS: ${BLOG_VIDEO_CONNECT_TIMEOUT_MS:-2000}
      BLOG_VIDEO_READ_TIMEOUT_MS: ${BLOG_VIDEO_READ_TIMEOUT_MS:-900000}
      BLOG_VIDEO_MAX_KEYFRAMES: ${BLOG_VIDEO_MAX_KEYFRAMES:-12}
      BLOG_VIDEO_ALLOW_LOCAL_FILES: ${BLOG_VIDEO_ALLOW_LOCAL_FILES:-false}
    volumes:
      - ../resouces/yaml:/app/resouces/yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      presentation-generator:
        condition: service_healthy
      document-converter:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  site:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
      args:
        VITE_GATEWAY_BASE_URL: ${VITE_GATEWAY_BASE_URL:-/}
        VITE_METING_CONSOLE_URL: ${VITE_METING_CONSOLE_URL:-}
    image: shizuki-site/site:latest
    container_name: shizuki-site-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${SITE_PORT:-5173}:80"

volumes:
  document-converter-work:
