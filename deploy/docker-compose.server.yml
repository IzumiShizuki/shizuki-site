name: shizuki-site

services:
  meting-api:
    build:
      context: ..
      dockerfile: tools/meting-sidecar/Dockerfile
    image: shizuki-site/meting-api:latest
    container_name: shizuki-site-meting-api
    restart: unless-stopped
    environment:
      METING_ALLOWED_PROVIDERS: ${METING_ALLOWED_PROVIDERS:-netease,kuwo,qq}
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit(@file_get_contents('http://127.0.0.1/health') !== false ? 0 : 1);\""]
      interval: 15s
      timeout: 5s
      retries: 5

  music-ncm-api:
    build:
      context: ..
      dockerfile: tools/music-ncm-sidecar/Dockerfile
    image: shizuki-site/music-ncm-api:latest
    container_name: shizuki-site-music-ncm-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login/qr/key?timestamp=' + Date.now()).then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  music-web-auth-sidecar:
    build:
      context: ..
      dockerfile: tools/music-web-auth-sidecar/Dockerfile
    image: shizuki-site/music-web-auth-sidecar:latest
    container_name: shizuki-site-music-web-auth-sidecar
    restart: unless-stopped
    env_file:
      - .env.server
    environment:
      PORT: ${MUSIC_WEB_AUTH_PORT:-39041}
      PLAYWRIGHT_BROWSERS_PATH: ${PLAYWRIGHT_BROWSERS_PATH:-/ms-playwright}
      MUSIC_WEB_AUTH_TOKEN: ${MUSIC_WEB_AUTH_TOKEN:-}
      MUSIC_WEB_AUTH_HEADLESS: ${MUSIC_WEB_AUTH_HEADLESS:-true}
      MUSIC_WEB_AUTH_BROWSER_PATH: ${MUSIC_WEB_AUTH_BROWSER_PATH:-}
      MUSIC_WEB_AUTH_TIMEOUT_MS: ${MUSIC_WEB_AUTH_TIMEOUT_MS:-45000}
      MUSIC_WEB_AUTH_NAV_TIMEOUT_MS: ${MUSIC_WEB_AUTH_NAV_TIMEOUT_MS:-60000}
      MUSIC_WEB_AUTH_POLL_INTERVAL_MS: ${MUSIC_WEB_AUTH_POLL_INTERVAL_MS:-1800}
      MUSIC_WEB_AUTH_TIMEZONE: ${MUSIC_WEB_AUTH_TIMEZONE:-Asia/Shanghai}
    volumes:
      - ${MUSIC_WEB_AUTH_DATA_DIR:-/opt/shizuki-site/data/music-web-auth}:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || 39041) + '/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  presentation-generator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.presentation-generator
    image: shizuki-site/presentation-generator:latest
    container_name: shizuki-site-presentation-generator
    restart: unless-stopped
    environment:
      PORT: ${PRESENTATION_GENERATOR_PORT:-3210}
      SLIDEV_EXPORT_TIMEOUT_MS: ${PRESENTATION_GENERATOR_EXPORT_TIMEOUT_MS:-600000}
      SLIDEV_PAGE_TIMEOUT_MS: ${PRESENTATION_GENERATOR_PAGE_TIMEOUT_MS:-180000}
      SLIDEV_WAIT_UNTIL: ${PRESENTATION_GENERATOR_WAIT_UNTIL:-load}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || 3210) + '/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  bill-sync-agent:
    build:
      context: ..
      # NOTE: Dockerfile.bill-sync-agent is currently missing from this repository.
      dockerfile: Dockerfile.bill-sync-agent
    image: shizuki-site/bill-sync-agent:latest
    container_name: shizuki-site-bill-sync-agent
    restart: unless-stopped
    env_file:
      - .env.server
    environment:
      PORT: ${BILL_SYNC_AGENT_PORT:-39031}
      PLAYWRIGHT_BROWSERS_PATH: ${PLAYWRIGHT_BROWSERS_PATH:-/ms-playwright}
      BILL_SYNC_AGENT_TOKEN: ${BILL_SYNC_AGENT_TOKEN:-}
      BILL_SYNC_AGENT_HEADLESS: ${BILL_SYNC_AGENT_HEADLESS:-true}
      BILL_SYNC_AGENT_BROWSER_PATH: ${BILL_SYNC_AGENT_BROWSER_PATH:-}
      BILL_SYNC_AGENT_TIMEOUT_MS: ${BILL_SYNC_AGENT_TIMEOUT_MS:-45000}
      BILL_SYNC_AGENT_NAV_TIMEOUT_MS: ${BILL_SYNC_AGENT_NAV_TIMEOUT_MS:-60000}
      BILL_SYNC_AGENT_TIMEZONE: ${BILL_SYNC_AGENT_TIMEZONE:-Asia/Shanghai}
      BILL_SYNC_AGENT_ALIPAY_LOGIN_URL: ${BILL_SYNC_AGENT_ALIPAY_LOGIN_URL:-}
      BILL_SYNC_AGENT_ALIPAY_BILL_URL: ${BILL_SYNC_AGENT_ALIPAY_BILL_URL:-}
      BILL_SYNC_AGENT_WECHAT_BILL_DIR: ${BILL_SYNC_AGENT_WECHAT_BILL_DIR:-/data/wechat-bills}
      BILL_SYNC_AGENT_BANKCARD_BILL_DIR: ${BILL_SYNC_AGENT_BANKCARD_BILL_DIR:-/data/bankcard-bills}
    volumes:
      - ${BILL_SYNC_AGENT_DATA_DIR:-/opt/shizuki-site/data/bill-sync-agent}:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || 39031) + '/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  document-converter:
    build:
      context: ..
      dockerfile: docker/Dockerfile.document-converter
    image: shizuki-site/document-converter:latest
    container_name: shizuki-site-document-converter
    restart: unless-stopped
    environment:
      VIDEO_CONVERTER_PORT: ${VIDEO_CONVERTER_PORT:-3220}
      VIDEO_MAX_DURATION_SECONDS: ${VIDEO_MAX_DURATION_SECONDS:-7200}
      VIDEO_MAX_DOWNLOAD_BYTES: ${VIDEO_MAX_DOWNLOAD_BYTES:-1073741824}
      VIDEO_MAX_KEYFRAMES: ${VIDEO_MAX_KEYFRAMES:-12}
      VIDEO_COOKIES_FILE: ${VIDEO_COOKIES_FILE:-}
      VIDEO_ENABLE_VISION: ${VIDEO_ENABLE_VISION:-false}
    volumes:
      - document-converter-work:/tmp/shizuki-video
      - ${VIDEO_COOKIES_HOST_FILE:-/dev/null}:${VIDEO_COOKIES_FILE:-/run/secrets/video-cookies.txt}:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3220/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    image: shizuki-site/backend:latest
    container_name: shizuki-site-backend
    restart: unless-stopped
    env_file:
      - .env.server
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      AI_CHAT_ENABLED: ${AI_CHAT_ENABLED:-false}
      AI_CHAT_BASE_URL: ${AI_CHAT_BASE_URL:-}
      AI_CHAT_API_KEY: ${AI_CHAT_API_KEY:-}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-cpa-gpt-5.4-mini}
      AI_CHAT_SYSTEM_PROMPT: ${AI_CHAT_SYSTEM_PROMPT:-}
      AI_CHAT_CONNECT_TIMEOUT_MS: ${AI_CHAT_CONNECT_TIMEOUT_MS:-2500}
      AI_CHAT_READ_TIMEOUT_MS: ${AI_CHAT_READ_TIMEOUT_MS:-90000}
      AI_CHAT_MAX_TOKENS: ${AI_CHAT_MAX_TOKENS:-800}
      AI_CHAT_MAX_CONTEXT_MESSAGES: ${AI_CHAT_MAX_CONTEXT_MESSAGES:-12}
      AI_CHAT_MAX_WORLDBOOK_ENTRIES: ${AI_CHAT_MAX_WORLDBOOK_ENTRIES:-8}
      AI_CHAT_TEMPERATURE: ${AI_CHAT_TEMPERATURE:-0.7}
      MUSIC_METING_BASE_URL: ${MUSIC_METING_BASE_URL:-http://meting-api}
      MUSIC_NCM_BASE_URL: ${MUSIC_NCM_BASE_URL:-http://music-ncm-api:3000}
      MUSIC_WEB_AUTH_BASE_URL: ${MUSIC_WEB_AUTH_BASE_URL:-http://music-web-auth-sidecar:39041}
      MUSIC_WEB_AUTH_TOKEN: ${MUSIC_WEB_AUTH_TOKEN:-}
      MUSIC_WEB_AUTH_CONNECT_TIMEOUT_MS: ${MUSIC_WEB_AUTH_CONNECT_TIMEOUT_MS:-1500}
      MUSIC_WEB_AUTH_READ_TIMEOUT_MS: ${MUSIC_WEB_AUTH_READ_TIMEOUT_MS:-5000}
      MUSIC_WEB_AUTH_POLL_INTERVAL_MS: ${MUSIC_WEB_AUTH_POLL_INTERVAL_MS:-1800}
      BLOG_PRESENTATION_GENERATOR_BASE_URL: ${BLOG_PRESENTATION_GENERATOR_BASE_URL:-http://presentation-generator:3210}
      BLOG_PRESENTATION_CONNECT_TIMEOUT_MS: ${BLOG_PRESENTATION_CONNECT_TIMEOUT_MS:-2000}
      BLOG_PRESENTATION_READ_TIMEOUT_MS: ${BLOG_PRESENTATION_READ_TIMEOUT_MS:-660000}
      BLOG_VIDEO_CONVERTER_BASE_URL: ${BLOG_VIDEO_CONVERTER_BASE_URL:-http://document-converter:3220}
      BLOG_VIDEO_CONNECT_TIMEOUT_MS: ${BLOG_VIDEO_CONNECT_TIMEOUT_MS:-2000}
      BLOG_VIDEO_READ_TIMEOUT_MS: ${BLOG_VIDEO_READ_TIMEOUT_MS:-900000}
      BLOG_VIDEO_MAX_KEYFRAMES: ${BLOG_VIDEO_MAX_KEYFRAMES:-12}
      BLOG_VIDEO_ALLOW_LOCAL_FILES: ${BLOG_VIDEO_ALLOW_LOCAL_FILES:-false}
    group_add:
      - "${DOCKER_SOCKET_GID:-988}"
    volumes:
      - ../resouces/yaml:/app/resouces/yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      meting-api:
        condition: service_healthy
      music-ncm-api:
        condition: service_healthy
      music-web-auth-sidecar:
        condition: service_healthy
      presentation-generator:
        condition: service_healthy
      bill-sync-agent:
        condition: service_healthy
      document-converter:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  site:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_GATEWAY_BASE_URL: ${VITE_GATEWAY_BASE_URL:-/}
        VITE_METING_CONSOLE_URL: ${VITE_METING_CONSOLE_URL:-}
        VITE_TLDRAW_LICENSE_KEY: ${VITE_TLDRAW_LICENSE_KEY:-}
    image: shizuki-site/site:latest
    container_name: shizuki-site-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${SITE_PORT:-5173}:80"

volumes:
  document-converter-work:
