name: shizuki-ops

services:
  portainer:
    image: portainer/portainer-ce:lts
    container_name: shizuki-site-portainer
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORTAINER_HTTPS_PORT:-9443}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  portainer_data:
