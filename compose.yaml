services:
  meting-api:
    build:
      context: .
      dockerfile: tools/meting-sidecar/Dockerfile
    image: ${METING_API_IMAGE:-shizuki-site/meting-api:latest}
    container_name: shizuki-meting-api
    profiles: [ "app" ]
    restart: unless-stopped
    environment:
      METING_ALLOWED_PROVIDERS: ${METING_ALLOWED_PROVIDERS:-netease,kuwo,qq}
    healthcheck:
      test: [ "CMD-SHELL", "php -r \"exit(@file_get_contents('http://127.0.0.1/health') !== false ? 0 : 1);\"" ]
      interval: 15s
      timeout: 5s
      retries: 5

  music-ncm-api:
    build:
      context: .
      dockerfile: tools/music-ncm-sidecar/Dockerfile
    image: ${MUSIC_NCM_API_IMAGE:-shizuki-site/music-ncm-api:latest}
    container_name: shizuki-music-ncm-api
    profiles: [ "app" ]
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login/qr/key?timestamp=' + Date.now()).then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))" ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  music-web-auth-sidecar:
    build:
      context: .
      dockerfile: tools/music-web-auth-sidecar/Dockerfile
    image: ${MUSIC_WEB_AUTH_IMAGE:-shizuki-site/music-web-auth-sidecar:latest}
    container_name: shizuki-music-web-auth-sidecar
    profiles: [ "app" ]
    restart: unless-stopped
    environment:
      PORT: ${MUSIC_WEB_AUTH_PORT:-39041}
      PLAYWRIGHT_BROWSERS_PATH: ${PLAYWRIGHT_BROWSERS_PATH:-/ms-playwright}
      MUSIC_WEB_AUTH_TOKEN: ${MUSIC_WEB_AUTH_TOKEN:-}
      MUSIC_WEB_AUTH_HEADLESS: ${MUSIC_WEB_AUTH_HEADLESS:-true}
      MUSIC_WEB_AUTH_BROWSER_PATH: ${MUSIC_WEB_AUTH_BROWSER_PATH:-}
      MUSIC_WEB_AUTH_TIMEOUT_MS: ${MUSIC_WEB_AUTH_TIMEOUT_MS:-45000}
      MUSIC_WEB_AUTH_NAV_TIMEOUT_MS: ${MUSIC_WEB_AUTH_NAV_TIMEOUT_MS:-60000}
      MUSIC_WEB_AUTH_POLL_INTERVAL_MS: ${MUSIC_WEB_AUTH_POLL_INTERVAL_MS:-1800}
      MUSIC_WEB_AUTH_TIMEZONE: ${MUSIC_WEB_AUTH_TIMEZONE:-Asia/Shanghai}
    volumes:
      - music-web-auth-data:/data
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || 39041) + '/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))" ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  document-converter:
    build:
      context: .
      dockerfile: Dockerfile.document-converter
    image: ${DOCUMENT_CONVERTER_IMAGE:-shizuki-site/document-converter:latest}
    container_name: shizuki-document-converter
    profiles: [ "app" ]
    restart: unless-stopped
    environment:
      VIDEO_CONVERTER_PORT: ${VIDEO_CONVERTER_PORT:-3220}
      VIDEO_MAX_DURATION_SECONDS: ${VIDEO_MAX_DURATION_SECONDS:-7200}
      VIDEO_MAX_DOWNLOAD_BYTES: ${VIDEO_MAX_DOWNLOAD_BYTES:-1073741824}
      VIDEO_MAX_KEYFRAMES: ${VIDEO_MAX_KEYFRAMES:-12}
      VIDEO_COOKIES_FILE: ${VIDEO_COOKIES_FILE:-}
      VIDEO_ENABLE_VISION: ${VIDEO_ENABLE_VISION:-false}
    volumes:
      - document-converter-work:/tmp/shizuki-video
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3220/health', timeout=3)" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16
    container_name: shizuki-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: shizuki_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h 127.0.0.1 -U postgres -d shizuki_app" ]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4
    container_name: shizuki-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 20

  kafka:
    image: bitnami/kafka:3.7
    container_name: shizuki-kafka
    profiles: [ "kafka" ]
    restart: unless-stopped
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_CFG_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_KRAFT_CLUSTER_ID: "abcdefghijklmnopqrstuv"
    ports:
      - "9092:9092"

  monolith-app:
    image: shizuki/monolith-app:latest
    container_name: shizuki-monolith
    profiles: [ "app" ]
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      AI_CHAT_ENABLED: ${AI_CHAT_ENABLED:-false}
      AI_CHAT_BASE_URL: ${AI_CHAT_BASE_URL:-}
      AI_CHAT_API_KEY: ${AI_CHAT_API_KEY:-}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-cpa-gpt-5.4-mini}
      AI_CHAT_SYSTEM_PROMPT: ${AI_CHAT_SYSTEM_PROMPT:-}
      AI_CHAT_CONNECT_TIMEOUT_MS: ${AI_CHAT_CONNECT_TIMEOUT_MS:-2500}
      AI_CHAT_READ_TIMEOUT_MS: ${AI_CHAT_READ_TIMEOUT_MS:-90000}
      AI_CHAT_MAX_TOKENS: ${AI_CHAT_MAX_TOKENS:-800}
      AI_CHAT_MAX_CONTEXT_MESSAGES: ${AI_CHAT_MAX_CONTEXT_MESSAGES:-12}
      AI_CHAT_MAX_WORLDBOOK_ENTRIES: ${AI_CHAT_MAX_WORLDBOOK_ENTRIES:-8}
      AI_CHAT_TEMPERATURE: ${AI_CHAT_TEMPERATURE:-0.7}
      MUSIC_METING_BASE_URL: ${MUSIC_METING_BASE_URL:-http://meting-api}
      MUSIC_NCM_BASE_URL: ${MUSIC_NCM_BASE_URL:-http://music-ncm-api:3000}
      MUSIC_WEB_AUTH_BASE_URL: ${MUSIC_WEB_AUTH_BASE_URL:-http://music-web-auth-sidecar:39041}
      MUSIC_WEB_AUTH_TOKEN: ${MUSIC_WEB_AUTH_TOKEN:-}
      MUSIC_WEB_AUTH_CONNECT_TIMEOUT_MS: ${MUSIC_WEB_AUTH_CONNECT_TIMEOUT_MS:-1500}
      MUSIC_WEB_AUTH_READ_TIMEOUT_MS: ${MUSIC_WEB_AUTH_READ_TIMEOUT_MS:-5000}
      MUSIC_WEB_AUTH_POLL_INTERVAL_MS: ${MUSIC_WEB_AUTH_POLL_INTERVAL_MS:-1800}
      BLOG_VIDEO_CONVERTER_BASE_URL: ${BLOG_VIDEO_CONVERTER_BASE_URL:-http://document-converter:3220}
      DB_URL: jdbc:postgresql://postgres:5432/shizuki_app
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AUDIT_PUBLISHER_TYPE: ${AUDIT_PUBLISHER_TYPE:-noop}
      AUDIT_KAFKA_TOPIC: shizuki.audit.log
    depends_on:
      meting-api:
        condition: service_healthy
      music-ncm-api:
        condition: service_healthy
      music-web-auth-sidecar:
        condition: service_healthy
      document-converter:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  document-converter-work:
  music-web-auth-data:
  postgres-data:
  redis-data:
